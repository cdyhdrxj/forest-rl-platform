version: "3.10"

services:
  server:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: server
    volumes:
    - ./apps/api:/app/api  
    ports:
      - "8000:8000"
    environment:
      - PYTHONUTF8=1

  client:
    image: node:20-alpine
    container_name: client
    working_dir: /app
    volumes:
      - ./apps/web:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"